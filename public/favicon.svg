<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ec4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background com gradiente -->
  <rect width="100" height="100" rx="22" fill="url(#grad)"/>
  
  <!-- Decoração decorativa (estilo pincel/makeup) -->
  <circle cx="30" cy="30" r="8" fill="white" opacity="0.3"/>
  <circle cx="70" cy="30" r="6" fill="white" opacity="0.2"/>
  
  <!-- Letras IL estilizadas -->
  <text x="50" y="72" font-family="Georgia, serif" font-size="42" font-weight="bold" fill="white" text-anchor="middle" filter="url(#shadow)">IL</text>
  
  <!-- Linha decorativa abaixo -->
  <line x1="25" y1="80" x2="75" y2="80" stroke="white" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
</svg>
